##############################################################################
# Glances configuration file — tuned for narrow/half-width terminals
# Location: ~/.config/glances/glances.conf
##############################################################################

[global]
check_update=false
refresh=2
strftime_format=%H:%M:%S

##############################################################################
# CPU
##############################################################################
[cpu]
disable=False
user_careful=50
user_warning=70
user_critical=90
system_careful=50
system_warning=70
system_critical=90
iowait_careful=20
iowait_warning=40
iowait_critical=60

[percpu]
# Off by default — saves vertical space. Press '1' in UI to toggle if needed.
disable=True

##############################################################################
# Memory
##############################################################################
[mem]
disable=False
careful=50
warning=70
critical=90

[memswap]
disable=False
careful=50
warning=70
critical=90

##############################################################################
# Load
##############################################################################
[load]
disable=False
careful=0.7
warning=1.0
critical=5.0

##############################################################################
# Processes — sorted by MEM, minimal columns
##############################################################################
[processlist]
disable=False
sort_key=memory_percent
hide_kernel_threads=True

# Hide unused columns to keep the list narrow
# THR = num_threads, NI = nice, S = status
fields_num_threads_hidden=True
fields_nice_hidden=True
fields_status_hidden=True

# Thresholds for color highlighting
cpu_careful=50
cpu_warning=70
cpu_critical=90
mem_careful=50
mem_warning=70
mem_critical=90

# Max number of processes shown (keeps the list compact)
max_processes=15

##############################################################################
# Disk I/O
##############################################################################
[diskio]
disable=False
hide=loop.*,/dev/loop.*,ram.*

##############################################################################
# Filesystem
##############################################################################
[fs]
disable=False
hide=/boot.*,/snap.*,/var/lib/docker.*,/run.*,/dev/loop.*
careful=50
warning=70
critical=90

##############################################################################
# Network — only show physical/real interfaces
##############################################################################
[network]
disable=False
hide=docker.*,lo,veth.*,br-.*,vnet.*,tun.*,tap.*

##############################################################################
# Sensors
##############################################################################
[sensors]
disable=False
temperature_core_careful=60
temperature_core_warning=75
temperature_core_critical=85
temperature_hdd_careful=45
temperature_hdd_warning=52
temperature_hdd_critical=60
battery_careful=80
battery_warning=90
battery_critical=95

##############################################################################
# Docker
##############################################################################
[containers]
disable=False
all=false
cpu_careful=50
cpu_warning=70
cpu_critical=90
mem_careful=20
mem_warning=50
mem_critical=80

##############################################################################
# Disabled plugins — reduce clutter in narrow layout
##############################################################################
[ports]
disable=True

[wifi]
disable=True

[folders]
disable=True

[amps]
disable=True

[gpu]
disable=True

[ip]
disable=True

[now]
disable=False

[uptime]
disable=False
