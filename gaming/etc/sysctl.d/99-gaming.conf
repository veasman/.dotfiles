# Gaming kernel tweaks
# Reduced VM writeback for less stutter under memory pressure
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
vm.vfs_cache_pressure = 50

# Swappiness — prefer cache over swap for responsiveness
vm.swappiness = 10

# Network latency
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576
net.ipv4.tcp_congestion_control = bbr
net.core.default_qdisc = fq

# Audio — reduce ALSA scheduling latency
dev.hpet.max-user-freq = 1024

# Kernel scheduling — NICE to 0 for desktop responsiveness
kernel.sched_autogroup_enabled = 1
kernel.sched_min_granularity_ns = 3000000
kernel.sched_wakeup_granularity_ns = 2500000
kernel.numa_balancing = 0
