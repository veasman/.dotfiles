# Gaming GPU tweaks
# Reduce PCIe latency for GPU
options nvidia NVreg_RegistryDwords="PowerMizerEnable=0x1; PerfLevelSrc=0x2222; PowerMizerLevel=0x1; PowerMizerLevelAC=0x1"
options nvidia NVreg_EnablePCIeGen3=1
options nvidia NVreg_UsePageAttributeTable=1
options nvidia NVreg_InitializeSystemMemoryAllocations=0
options nvidia NVreg_DynamicPowerManagement=0x02

# AMDGPU (if applicable)
options amdgpu audio=0
options amdgpu gpu_recovery=1

# USB — reduce interrupt moderation for high-polling-rate devices
options usbcore autosuspend=-1
