# ---- window ----
initial_window_width   120c
initial_window_height  32c
window_padding_width   0

# ---- tabs ----
tab_bar_style hidden

# ---- performance ----
input_delay 3
repaint_delay 10
sync_to_monitor yes

# ---- scrollback ----
scrollback_lines 10000

# ---- theme (generated by loom) ----
include ~/.local/state/loom/generated/kitty-theme.conf
