# ---- font ----
font_family      FiraCode Nerd Font
font_size        13.0

# ---- window ----

initial_window_width   120c
initial_window_height  32c
window_padding_width   0
background_opacity     0.95

# ---- cursor ----
cursor_shape           block
cursor_blink_interval  0
cursor                  #e6edf3
cursor_text_color       #0f1117


# ---- tabs ----

tab_bar_style hidden

# ---- performance ----

input_delay 3
repaint_delay 10
sync_to_monitor yes

# ---- scrollback ----

scrollback_lines 10000

# ---- theme (generated by loom) ----

include ~/.local/state/loom/generated/kitty-theme.conf
