[general]
live_config_reload = true
ipc_socket = true

[env]
TERM = "xterm-256color"

[window]
dimensions = { columns = 120, lines = 32 }
#padding = { x = 10, y = 10 }
dynamic_padding = true
decorations = "Full"
opacity = 0.95
blur = false
startup_mode = "Windowed"
dynamic_title = true

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold = { family = "FiraCode Nerd Font", style = "Bold" }
italic = { family = "FiraCode Nerd Font", style = "Italic" }
bold_italic = { family = "FiraCode Nerd Font", style = "Bold Italic" }

size = 13.0
offset = { x = 0, y = 0 }
glyph_offset = { x = 0, y = 0 }

[cursor]
style = { shape = "Block", blinking = "off" }
unfocused_hollow = true

[mouse]
hide_when_typing = true

[colors.primary]
background = "#0f1117"
foreground = "#c9d1d9"

[colors.cursor]
text = "#0f1117"
cursor = "#58a6ff"

[colors.selection]
text = "#ffffff"
background = "#264f78"

[colors.normal]
black   = "#484f58"
red     = "#ff7b72"
green   = "#3fb950"
yellow  = "#d29922"
blue    = "#58a6ff"
magenta = "#bc8cff"
cyan    = "#39c5cf"
white   = "#b1bac4"

[colors.bright]
black   = "#6e7681"
red     = "#ffa198"
green   = "#56d364"
yellow  = "#e3b341"
blue    = "#79c0ff"
magenta = "#d2a8ff"
cyan    = "#56d4dd"
white   = "#ffffff"
