[preferred]
# Default chain: hyprland for compositor-specific bits (screencast,
# global shortcuts, output info), gtk for everything else (settings,
# notifications, secret service, etc).
default=hyprland;gtk

# File picker → lf in kara-toe-client via termfilechooser. Replaces
# the GTK chooser whose 96px image previews were unreadable for
# receipt photos.
org.freedesktop.impl.portal.FileChooser=termfilechooser

# Screencast → hyprland's backend. With hyprland-share-picker-preview
# installed (AUR), the picker shows visual thumbnails of every window
# / monitor instead of the wlr backend's text-only list.
org.freedesktop.impl.portal.ScreenCast=hyprland
