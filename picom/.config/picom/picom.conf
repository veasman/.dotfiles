# generated by loom

backend = "glx";
vsync = true;

detect-rounded-corners = true;
detect-client-opacity = true;
unredir-if-possible = false;

rounded-corners = true;
round-borders = 1;

corner-radius = 16;

shadow = true;
shadow-opacity = 0.25;
shadow-offset-x = -12;
shadow-offset-y = -12;

active-opacity = 1.0;
inactive-opacity = 0.88;
frame-opacity = 1.0;

fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'rofi'",
  "class_g = 'dunst'"
];

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 1.0; focus = true; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 1.0; };
  dropdown_menu = { opacity = 1.0; };
};
