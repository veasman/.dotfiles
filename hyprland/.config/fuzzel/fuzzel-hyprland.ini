# fuzzel — ~/.config/fuzzel/fuzzel.ini  (Hyprland session override)
#
# Pillier, slightly translucent variant of the shared fuzzel config —
# rounded corners and a softer surface so the launcher fits the rest
# of the Hyprland UI (pill-shaped waybar, blurred specials, etc.).
# Sway continues to use the parent fuzzel/ stow package's fuzzel.ini.

font=FiraCode Nerd Font:size=12
terminal=kara-toe-client
prompt="❯ "
dpi-aware=auto
width=42
lines=10
horizontal-pad=20
vertical-pad=14
inner-pad=8
line-height=24
icon-theme=Papirus-Dark
icons-enabled=yes

[colors]
background=111111e6
text=f2f2f2ff
match=6bacacff
selection=6bacac33
selection-text=f2f2f2ff
selection-match=6bacacff
border=6bacacff

[border]
width=2
radius=12
