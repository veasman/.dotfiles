# hyprpaper.conf — ~/.config/hypr/hyprpaper.conf
#
# Not used directly — hyprland-hyprpaper wrapper generates
# hyprpaper-generated.conf with $HOME resolved at runtime.
# Actual wallpaper selection goes through hyprland-wallpaper apply.
#
# This file exists as a static fallback if the wrapper fails.

ipc = on
splash = false
