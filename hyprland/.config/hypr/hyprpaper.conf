# hyprpaper.conf — ~/.config/hypr/hyprpaper.conf
#
# Native Hyprland wallpaper daemon. Preload the wallpaper, then set
# it on every output. Add additional monitor-specific lines if you
# want different wallpapers per output.

preload = ~/.local/state/sway/wallpapers/default.png
wallpaper = , ~/.local/state/sway/wallpapers/default.png

ipc = on
splash = false
