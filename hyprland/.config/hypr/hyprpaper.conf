# hyprpaper.conf — ~/.config/hypr/hyprpaper.conf
#
# Minimal — actual wallpaper selection is managed at runtime by
# hyprland-wallpaper (see ~/.local/bin/hyprland-wallpaper). On
# session start, hyprland.conf has an `exec-once` that calls
# `hyprland-wallpaper apply`, which reads the saved selection from
# ~/.local/state/hypr/wallpaper-current and pushes it via hyprctl
# hyprpaper IPC.
#
# Preload a fallback so hyprpaper has a default wallpaper to show
# before the apply script runs (avoids a black flash at login).

preload = ~/.local/state/sway/wallpapers/default.png
wallpaper = , ~/.local/state/sway/wallpapers/default.png

ipc = on
splash = false
