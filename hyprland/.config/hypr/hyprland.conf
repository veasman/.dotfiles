# hyprland.conf — ~/.config/hypr/hyprland.conf
#
# Reload: mod+Shift+r. Exit: mod+Shift+q.
#
# Hyprland's hyprlang parser does NOT support backslash line
# continuation — every directive must be on a single line.

# ─── Variables ───────────────────────────────────────────────────────
$mod = SUPER
$terminal = kara-toe-client
$browser = floorp
$file_manager = kara-toe-client --app-id=yazi yazi
$launcher = fuzzel --config=$HOME/.config/fuzzel/fuzzel-hyprland.ini

# ─── Monitors ────────────────────────────────────────────────────────
# Default fallback for any monitor not explicitly named below — picks
# preferred mode + auto position so a freshly-plugged display Just
# Works (and the hyprland-output-profile script can later refine
# placement if needed).
monitor = , preferred, auto, 1

# Named overrides (apply when these names actually exist; harmless
# otherwise so the config is the same docked or undocked).
monitor = eDP-1,   preferred, auto, 1
monitor = DVI-I-2, 1920x1080,  0x0,    1, transform, 3
monitor = DVI-I-1, 2560x1440@144, 1080x0, 1
monitor = DP-2,    1920x1080,  3640x0, 1, transform, 1

# ─── Workspaces ──────────────────────────────────────────────────────
# Plain global 1-9 for now. Per-output workspace numbering (via
# hyprland-ws + workspace= rules) was racy on this Hyprland version
# and made debugging mod+1..9 harder. mod+1..9 below uses the native
# `workspace` dispatcher; bindings work the same on laptop-only or
# multi-monitor setups, just sharing workspaces across outputs.

# ─── General / colors ────────────────────────────────────────────────
# Theme matches kara: bg=#111111 accent=#6bacac border=#353535.
general {
    border_size = 2
    gaps_in = 4
    gaps_out = 8
    col.active_border = rgb(6bacac)
    col.inactive_border = rgb(353535)
    layout = master
    resize_on_border = true
    no_focus_fallback = true
    allow_tearing = false
}

# ─── Decoration ──────────────────────────────────────────────────────
# Blur subsystem stays enabled but is suppressed on every window via
# the `noblur` rule below — only the waybar layer (see layerrule)
# gets a light blur. Special workspaces still dim the underlying
# workspace via `dim_special`; that's separate from blur.
decoration {
    rounding = 6
    dim_special = 0.45
    blur {
        enabled = true
        size = 4
        passes = 1
        new_optimizations = true
        ignore_opacity = false
    }
    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = rgba(00000080)
    }
}

# Nothing rendered as a window gets blurred. Terminal, browser,
# scratchpad popups — all unblurred. (Subsystem stays on so the
# layerrule below still has something to attach to.)
windowrule = no_blur on, match:class .*

# Bar gets the only blur. Waybar's layer-shell namespace is "waybar".
layerrule = blur on, match:namespace waybar

# ─── Animations (snappy — kept short for 144Hz) ──────────────────────
animations {
    enabled = true
    bezier = snap, 0.22, 1, 0.36, 1
    bezier = pop, 0.34, 1.56, 0.64, 1
    animation = windows,          1, 2, snap
    animation = windowsOut,       1, 2, snap, popin 80%
    animation = workspaces,       1, 2, snap
    animation = specialWorkspace, 1, 3, snap, slidefadevert
    animation = fade,             1, 2, snap
    animation = border,           1, 5, snap
}

# ─── Master layout ───────────────────────────────────────────────────
# Master takes the left half (mfact 0.5); the slave stack fills the
# right. New windows append to the BOTTOM of the slave stack rather
# than displacing the current master — `new_status = slave` keeps the
# master where it is, `new_on_top = false` puts the newcomer at the
# end of the stack instead of the top.
master {
    new_status = slave
    new_on_top = false
    mfact = 0.5
    orientation = left
}

# ─── Input ───────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 0
    mouse_refocus = false
    sensitivity = 0
    touchpad {
        natural_scroll = false
        tap-to-click = true
        disable_while_typing = true
    }
}

# ─── Misc ────────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = false
    force_default_wallpaper = 0
    background_color = rgb(111111)
    enable_swallow = false
    vfr = true
}

cursor {
    inactive_timeout = 2
    no_warps = true
}

# ─── Environment ─────────────────────────────────────────────────────
env = XCURSOR_THEME, Bibata-Modern-Classic
env = XCURSOR_SIZE, 20
env = HYPRCURSOR_THEME, Bibata-Modern-Classic
env = HYPRCURSOR_SIZE, 20
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = QT_QPA_PLATFORM, wayland
env = MOZ_ENABLE_WAYLAND, 1
env = _JAVA_AWT_WM_NONREPARENTING, 1
env = ELECTRON_OZONE_PLATFORM_HINT, wayland

# ─── Window rules ────────────────────────────────────────────────────
# Modern syntax (wiki/Configuring/Window-Rules):
#   windowrule = match:FIELD REGEX, EFFECT [VALUE]
# `match:class REGEX` is space-separated; bool effects like `float`
# need an explicit `1`/`on` value (the parser otherwise treats bare
# `float` as a prop name with a missing value).

# Initial app placement.
windowrule = match:class ^(thunderbird|thunderbird-esr)$, workspace 8

# Pavucontrol / mpv: centered floats.
windowrule = match:class ^(pavucontrol)$, float 1, size 60% 60%, center 1
windowrule = match:class ^(mpv)$,         float 1, size 80% 80%, center 1

# Generic transient dialogs.
windowrule = match:title ^(Open File|Save As)$, float 1

# ─── Scratchpads (special workspaces, autostart + monocle default) ───
# Two specials, two windows each (matches the user's preference that
# related popups share a scratchpad and you cycle between them with
# mod+j/k):
#   special:todo  ← scratch-todo (TODO.md) + scratch-glances (glances)
#   special:media ← spotatui (music) + pulsemixer (audio mixer)
#
# Each scratchpad window opens in `fullscreen_state 1 0` (Hyprland's
# "maximize" mode) so the special-workspace toggle reveals one
# window filling the workspace area — kara's monocle default.
# mod+j / mod+k cycle which window holds the maximize, via
# hyprland-monocle.
windowrule = match:class ^(scratch-todo|scratch-glances)$, workspace special:todo silent
windowrule = match:class ^(spotatui|pulsemixer)$,          workspace special:media silent
windowrule = match:class ^(scratch-todo|scratch-glances|spotatui|pulsemixer)$, fullscreen_state 1 0

# ─── Autostart ───────────────────────────────────────────────────────
# Background services. Each on a single line — hyprlang doesn't
# accept backslash continuations.
exec-once = swaync
exec-once = waybar -c $HOME/.config/waybar/hyprland.jsonc -s $HOME/.config/waybar/hyprland-style.css
exec-once = hyprpaper
exec-once = hypridle
exec-once = kara-toe --server
exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = /usr/lib/xdg-desktop-portal
# Initial focus + browser launch on whatever the focused monitor is.
exec-once = sh -c 'sleep 2 && floorp'

# Scratchpad windows. The windowrules above route them to their
# special workspace silently and start them in monocle (maximize)
# mode. Bindings below just toggle the whole special.
exec-once = sh -c 'sleep 1 && kara-toe-client --app-id=scratch-todo nvim $HOME/.dotfiles/personal/TODO.md'
exec-once = sh -c 'sleep 1 && kara-toe-client --app-id=scratch-glances glances --time 5'
exec-once = sh -c 'sleep 1 && kara-toe-client --app-id=spotatui tmux new-session -A -s spotify spotatui'
exec-once = sh -c 'sleep 1 && kara-toe-client --app-id=pulsemixer pulsemixer'

# Apply saved wallpaper + cursor choices on session start (after
# hyprpaper has had a moment to come up).
exec-once = sh -c 'sleep 2 && hyprland-wallpaper apply'
exec-once = sh -c 'sleep 2 && hyprland-cursor apply'

# ═══════════════════════════════════════════════════════════════════
# Keybinds
# ═══════════════════════════════════════════════════════════════════

# ─── App launch ──────────────────────────────────────────────────────
bind = $mod, Return,        exec, $terminal
bind = $mod, D,             exec, $launcher
bind = $mod, E,             exec, $file_manager
bind = $mod SHIFT, V,       exec, rofi-videos
# mod+m and mod+g are intentionally unbound — pulsemixer and glances
# now share scratchpads with their related apps (special:media and
# special:todo respectively), accessed via mod+; and mod+'.

# ─── Screenshots / color picker ──────────────────────────────────────
# hyprshot wraps grim/slurp/wl-copy with notifications and sane
# default save paths. -m output = current monitor, -m region = drag
# selection. --clipboard-only skips the file write.
bind = , Print,             exec, hyprshot -m output -o ~/Pictures
bind = $mod SHIFT, S,       exec, hyprshot -m region --clipboard-only
bind = $mod, Print,         exec, hyprshot -m window -o ~/Pictures
# hyprpicker -a copies the picked color to the clipboard. Useful
# for theme work — pair with `wl-paste` to read back.
bind = $mod SHIFT, P,       exec, hyprpicker -a -n

# ─── Scratchpads (toggle native specials, windows pre-spawned) ───────
# Two scratchpads, each with two related apps stacked in monocle:
#   mod+'  → special:todo  (TODO.md ↔ glances)
#   mod+;  → special:media (spotatui ↔ pulsemixer)
# mod+j / mod+k while the special is open cycle the maximize between
# the two windows (via hyprland-monocle in the focus binds above).
bind = $mod, apostrophe, togglespecialworkspace, todo
bind = $mod, semicolon,  togglespecialworkspace, media

# ─── Focus ───────────────────────────────────────────────────────────
# mod+j/mod+k cycle leaves with monocle awareness: while monocle is
# active they atomically swap fullscreen state to the next leaf;
# otherwise they walk focus only.
bind = $mod, J,             exec, hyprland-monocle cycle-next
bind = $mod, K,             exec, hyprland-monocle cycle-prev
bind = $mod, H,             focusmonitor, l
bind = $mod, L,             focusmonitor, r
bind = $mod SHIFT, H,       movewindow, mon:l
bind = $mod SHIFT, L,       movewindow, mon:r

# ─── Master area resize + zoom ───────────────────────────────────────
bind = $mod, bracketleft,   layoutmsg, mfact -0.05
bind = $mod, bracketright,  layoutmsg, mfact +0.05
bind = $mod SHIFT, Return,  layoutmsg, swapwithmaster master

# ─── Layout ──────────────────────────────────────────────────────────
# mod+f       = kara-style monocle. Focused window fills the
#               workspace area but bar/gaps/borders stay visible
#               (Hyprland fullscreen mode 1 = maximize). mod+j/mod+k
#               while monocle is active swap maximize to the next
#               leaf via hyprland-monocle's atomic batch.
# mod+Shift+f = true fullscreen. Covers everything, including the
#               waybar — for video/games. Native `fullscreen, 0`.
bind = $mod, F,             exec, hyprland-monocle toggle
bind = $mod SHIFT, F,       fullscreen, 0
bind = $mod, T,             exec, hyprland-float-toggle

# ─── Window management ───────────────────────────────────────────────
bind = $mod, Q,             killactive,
bind = $mod SHIFT, R,       exec, hyprctl reload
bind = $mod SHIFT, Q,       exit,
bind = $mod SHIFT, X,       exec, hyprlock

# ─── Wallpaper + cursor pickers (preview-cycle submaps) ──────────────
# Same UX as the sway versions: enter a submap, h/l (or arrows) to
# cycle with live preview, Enter commits, Escape reverts. Selection
# persists to ~/.local/state/hypr/{wallpaper,cursor}-current.
bind = $mod SHIFT, W, submap, wallpaper
# Cursor mode: temporarily disable cursor autohide so the preview is
# actually visible while cycling. Restored on commit/revert below.
bind = $mod SHIFT, C, exec, hyprctl keyword cursor:inactive_timeout 0
bind = $mod SHIFT, C, submap, cursor

submap = wallpaper
bind = , Right,  exec, hyprland-wallpaper next
bind = , l,      exec, hyprland-wallpaper next
bind = , Down,   exec, hyprland-wallpaper next
bind = , j,      exec, hyprland-wallpaper next
bind = , Left,   exec, hyprland-wallpaper prev
bind = , h,      exec, hyprland-wallpaper prev
bind = , Up,     exec, hyprland-wallpaper prev
bind = , k,      exec, hyprland-wallpaper prev
bind = , Return, exec, hyprland-wallpaper commit
bind = , Return, submap, reset
bind = , Escape, exec, hyprland-wallpaper revert
bind = , Escape, submap, reset
bind = , q,      exec, hyprland-wallpaper revert
bind = , q,      submap, reset
submap = reset

submap = cursor
bind = , Right,  exec, hyprland-cursor next
bind = , l,      exec, hyprland-cursor next
bind = , Down,   exec, hyprland-cursor next
bind = , j,      exec, hyprland-cursor next
bind = , Left,   exec, hyprland-cursor prev
bind = , h,      exec, hyprland-cursor prev
bind = , Up,     exec, hyprland-cursor prev
bind = , k,      exec, hyprland-cursor prev
# Each exit binding restores cursor autohide (default 2s) before
# resetting the submap.
bind = , Return, exec, hyprland-cursor commit
bind = , Return, exec, hyprctl keyword cursor:inactive_timeout 2
bind = , Return, submap, reset
bind = , Escape, exec, hyprland-cursor revert
bind = , Escape, exec, hyprctl keyword cursor:inactive_timeout 2
bind = , Escape, submap, reset
bind = , q,      exec, hyprland-cursor revert
bind = , q,      exec, hyprctl keyword cursor:inactive_timeout 2
bind = , q,      submap, reset
submap = reset

# ─── Workspaces (native dispatchers, global 1-9) ─────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# ─── Floating with mouse ─────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ─── Media / volume / brightness keys ────────────────────────────────
bindl = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute,         exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86MonBrightnessUp,   exec, brightnessctl set +10%
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindl = , XF86AudioPlay,         exec, playerctl play-pause
bindl = , XF86AudioNext,         exec, playerctl next
bindl = , XF86AudioPrev,         exec, playerctl previous
