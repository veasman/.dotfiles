# hyprland.conf — ~/.config/hypr/hyprland.conf
#
# Reload: mod+Shift+r. Exit: mod+Shift+q.
#
# Hyprland's hyprlang parser does NOT support backslash line
# continuation — every directive must be on a single line.

# ─── Variables ───────────────────────────────────────────────────────
$mod = SUPER
$terminal = kara-toe-client
$browser = floorp
$file_manager = kara-toe-client --app-id=yazi yazi
$launcher = fuzzel -c ~/.config/fuzzel/fuzzel-hyprland.ini

# ─── Monitors ────────────────────────────────────────────────────────
# Default fallback for any monitor not explicitly named below — picks
# preferred mode + auto position so a freshly-plugged display Just
# Works (and the hyprland-output-profile script can later refine
# placement if needed).
monitor = , preferred, auto, 1

# Named overrides (apply when these names actually exist; harmless
# otherwise so the config is the same docked or undocked).
monitor = eDP-1,   preferred, auto, 1
monitor = DVI-I-2, 1920x1080,  0x0,    1, transform, 3
monitor = DVI-I-1, 2560x1440@144, 1080x0, 1
monitor = DP-2,    1920x1080,  3640x0, 1, transform, 1

# ─── Per-output workspaces ───────────────────────────────────────────
# Each monitor owns a 1-9 range. hyprland-ws translates mod+1..9 into
# the right absolute ID based on focused monitor. Waybar's
# format-icons strips the tens digit so the bar shows 1-9 regardless.
#
# IMPORTANT: no `default:true` here. With it, the default workspace
# of an absent monitor still gets created on whatever monitor is
# online (so undocking would spawn a phantom workspace 21 on eDP-1
# rendered as another "1" in the bar).
workspace = r[1-9],   monitor:eDP-1, persistent:false
workspace = r[11-19], monitor:DVI-I-2, persistent:false
workspace = r[21-29], monitor:DVI-I-1, persistent:false
workspace = r[31-39], monitor:DP-2, persistent:false

# ─── General / colors ────────────────────────────────────────────────
# Theme matches kara: bg=#111111 accent=#6bacac border=#353535.
general {
    border_size = 2
    gaps_in = 4
    gaps_out = 8
    col.active_border = rgb(6bacac)
    col.inactive_border = rgb(353535)
    layout = master
    resize_on_border = true
    no_focus_fallback = true
    allow_tearing = false
}

# ─── Decoration (dim + blur on specials = kara's scratchpad UX) ──────
decoration {
    rounding = 6
    dim_special = 0.45
    blur {
        enabled = true
        special = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = false
    }
    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = rgba(00000080)
    }
}

# ─── Animations (snappy — kept short for 144Hz) ──────────────────────
animations {
    enabled = true
    bezier = snap, 0.22, 1, 0.36, 1
    bezier = pop, 0.34, 1.56, 0.64, 1
    animation = windows,          1, 2, snap
    animation = windowsOut,       1, 2, snap, popin 80%
    animation = workspaces,       1, 2, snap
    animation = specialWorkspace, 1, 3, snap, slidefadevert
    animation = fade,             1, 2, snap
    animation = border,           1, 5, snap
}

# ─── Master layout (mfact, swap-with-master) ─────────────────────────
master {
    new_status = master
    mfact = 0.55
    orientation = left
}

# ─── Input ───────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 0
    mouse_refocus = false
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

# ─── Misc ────────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = false
    force_default_wallpaper = 0
    background_color = rgb(111111)
    enable_swallow = false
    vfr = true
}

cursor {
    inactive_timeout = 2
    no_warps = true
}

# ─── Environment ─────────────────────────────────────────────────────
env = XCURSOR_THEME, Bibata-Modern-Classic
env = XCURSOR_SIZE, 20
env = HYPRCURSOR_THEME, Bibata-Modern-Classic
env = HYPRCURSOR_SIZE, 20
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = QT_QPA_PLATFORM, wayland
env = MOZ_ENABLE_WAYLAND, 1
env = _JAVA_AWT_WM_NONREPARENTING, 1
env = ELECTRON_OZONE_PLATFORM_HINT, wayland

# ─── Window rules ────────────────────────────────────────────────────
# Initial app placement (docked profile).
windowrulev2 = workspace 31, class:^(thunderbird)$
windowrulev2 = workspace 31, class:^(thunderbird-esr)$

# Pavucontrol / mpv as centered floats.
windowrulev2 = float,           class:^(pavucontrol)$
windowrulev2 = size 60% 60%,    class:^(pavucontrol)$
windowrulev2 = center 1,        class:^(pavucontrol)$
windowrulev2 = float,           class:^(mpv)$
windowrulev2 = size 80% 80%,    class:^(mpv)$
windowrulev2 = center 1,        class:^(mpv)$

# Generic transient dialogs.
windowrulev2 = float,    title:^(Open File)$
windowrulev2 = float,    title:^(Save As)$
windowrulev2 = center 1, floating:1, onworkspace:m[*]

# ─── Scratchpads (Hyprland special workspaces) ───────────────────────
# `silent` = route there without yanking focus on map.
windowrulev2 = workspace special:todo silent,    class:^(scratch-todo)$
windowrulev2 = workspace special:music silent,   class:^(spotatui)$
windowrulev2 = workspace special:glances silent, class:^(scratch-glances)$
windowrulev2 = workspace special:mixer silent,   class:^(pulsemixer)$

# Pop-up specials are floating + sized + centered. Glances / music
# tile within their special workspace and naturally fill the output.
windowrulev2 = float,        class:^(scratch-todo)$
windowrulev2 = size 75% 80%, class:^(scratch-todo)$
windowrulev2 = center 1,     class:^(scratch-todo)$
windowrulev2 = float,        class:^(pulsemixer)$
windowrulev2 = size 60% 60%, class:^(pulsemixer)$
windowrulev2 = center 1,     class:^(pulsemixer)$

# ─── Autostart ───────────────────────────────────────────────────────
# Background services. Each on a single line — hyprlang doesn't
# accept backslash continuations.
exec-once = swaync
exec-once = waybar -c ~/.config/waybar/hyprland.jsonc -s ~/.config/waybar/hyprland-style.css
exec-once = hyprpaper
exec-once = hypridle
exec-once = kara-toe --server
exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = /usr/lib/xdg-desktop-portal
# Initial focus + browser launch on whatever the focused monitor is.
exec-once = sh -c 'sleep 2 && floorp'

# ═══════════════════════════════════════════════════════════════════
# Keybinds
# ═══════════════════════════════════════════════════════════════════

# ─── App launch ──────────────────────────────────────────────────────
bind = $mod, Return,        exec, $terminal
bind = $mod, D,             exec, $launcher
bind = $mod, E,             exec, $file_manager
bind = $mod SHIFT, V,       exec, rofi-videos

# ─── Screenshots ─────────────────────────────────────────────────────
# Use grim/slurp directly so we don't depend on hyprshot being
# installed. Works the same on sway and Hyprland.
bind = , Print,             exec, sh -c 'grim ~/Pictures/screenshot-$(date +%s).png'
bind = $mod SHIFT, S,       exec, sh -c 'grim -g "$(slurp)" - | wl-copy -t image/png'

# ─── Scratchpads (special workspaces, spawn-on-demand) ───────────────
bind = $mod, apostrophe, exec, hyprland-scratch-show todo "kara-toe-client --app-id=scratch-todo nvim $HOME/.dotfiles/personal/TODO.md"
bind = $mod, semicolon,  exec, hyprland-scratch-show music "kara-toe-client --app-id=spotatui tmux new-session -A -s spotify spotatui"
bind = $mod, G,          exec, hyprland-scratch-show glances "kara-toe-client --app-id=scratch-glances glances --time 5"
bind = $mod, M,          exec, hyprland-scratch-show mixer "kara-toe-client --app-id=pulsemixer pulsemixer"

# ─── Focus ───────────────────────────────────────────────────────────
# mod+j/mod+k cycle leaves with monocle awareness: while monocle is
# active they atomically swap fullscreen state to the next leaf;
# otherwise they walk focus only.
bind = $mod, J,             exec, hyprland-monocle cycle-next
bind = $mod, K,             exec, hyprland-monocle cycle-prev
bind = $mod, H,             focusmonitor, l
bind = $mod, L,             focusmonitor, r
bind = $mod SHIFT, H,       movewindow, mon:l
bind = $mod SHIFT, L,       movewindow, mon:r

# ─── Master area resize + zoom ───────────────────────────────────────
bind = $mod, bracketleft,   layoutmsg, mfact -0.05
bind = $mod, bracketright,  layoutmsg, mfact +0.05
bind = $mod SHIFT, Return,  layoutmsg, swapwithmaster master

# ─── Layout ──────────────────────────────────────────────────────────
# mod+f = kara-style monocle — focused window fills the workspace
# area but bar/gaps/borders stay visible. Implemented via Hyprland's
# fullscreen mode 1 (maximize). hyprland-monocle is just a thin
# wrapper that uses fullscreenstate for explicit on/off control so
# the cycle path can swap state atomically.
bind = $mod, F,             exec, hyprland-monocle toggle
bind = $mod, T,             exec, hyprland-float-toggle

# ─── Window management ───────────────────────────────────────────────
bind = $mod, Q,             killactive,
bind = $mod SHIFT, R,       exec, hyprctl reload
bind = $mod SHIFT, Q,       exit,
bind = $mod SHIFT, X,       exec, hyprlock

# ─── Workspaces (per-output, via hyprland-ws helper) ─────────────────
bind = $mod, 1, exec, hyprland-ws switch 1
bind = $mod, 2, exec, hyprland-ws switch 2
bind = $mod, 3, exec, hyprland-ws switch 3
bind = $mod, 4, exec, hyprland-ws switch 4
bind = $mod, 5, exec, hyprland-ws switch 5
bind = $mod, 6, exec, hyprland-ws switch 6
bind = $mod, 7, exec, hyprland-ws switch 7
bind = $mod, 8, exec, hyprland-ws switch 8
bind = $mod, 9, exec, hyprland-ws switch 9
bind = $mod SHIFT, 1, exec, hyprland-ws move 1
bind = $mod SHIFT, 2, exec, hyprland-ws move 2
bind = $mod SHIFT, 3, exec, hyprland-ws move 3
bind = $mod SHIFT, 4, exec, hyprland-ws move 4
bind = $mod SHIFT, 5, exec, hyprland-ws move 5
bind = $mod SHIFT, 6, exec, hyprland-ws move 6
bind = $mod SHIFT, 7, exec, hyprland-ws move 7
bind = $mod SHIFT, 8, exec, hyprland-ws move 8
bind = $mod SHIFT, 9, exec, hyprland-ws move 9

# ─── Floating with mouse ─────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ─── Media / volume / brightness keys ────────────────────────────────
bindl = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute,         exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86MonBrightnessUp,   exec, brightnessctl set +10%
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindl = , XF86AudioPlay,         exec, playerctl play-pause
bindl = , XF86AudioNext,         exec, playerctl next
bindl = , XF86AudioPrev,         exec, playerctl previous
