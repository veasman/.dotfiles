# hyprland.conf — ~/.config/hypr/hyprland.conf
#
# Ported from sway/.config/sway/config (which itself was ported from
# kara-gate.conf). Hyprland gives back native dim/blur for special
# workspaces (kara's "scratchpad overlay" UX) and per-event
# animations, which is the main reason for the side-by-side trial.
#
# Reload: mod+Shift+r. Exit: mod+Shift+q.

# ─── Variables ───────────────────────────────────────────────────────
$mod = SUPER
$terminal = kara-toe-client
$browser = floorp
$file_manager = kara-toe-client --app-id=yazi yazi
$launcher = fuzzel

# ─── Monitors ────────────────────────────────────────────────────────
# Layout matches kara/sway: portrait-left, 1440p center 144Hz, portrait-right.
# Hyprland uses a transform integer (0=normal, 1=90, 2=180, 3=270).
# When externals are absent, eDP-1 takes over at 0,0.
monitor = DVI-I-2, 1920x1080, 0x0, 1.0, transform, 3
monitor = DVI-I-1, 2560x1440@144, 1080x0, 1.0
monitor = DP-2, 1920x1080, 3640x0, 1.0, transform, 1
monitor = eDP-1, preferred, auto, 1.0
# Disable laptop panel when externals come up. Hyprland-output-profile
# (when ported from sway-output-profile) will manage this dynamically;
# for the MVP, manual `hyprctl keyword monitor "eDP-1, disable"` works.

# ─── Per-output workspaces ───────────────────────────────────────────
# Each monitor owns a 1-9 range. The hyprland-ws helper translates
# mod+1..mod+9 into the right absolute workspace ID based on which
# monitor is focused. Waybar's hyprland/workspaces module strips the
# tens digit so the bar displays 1-9 regardless of the output.
workspace = r[1-9],   monitor:eDP-1
workspace = r[11-19], monitor:DVI-I-2
workspace = r[21-29], monitor:DVI-I-1, default:true
workspace = r[31-39], monitor:DP-2

# ─── General / colors ────────────────────────────────────────────────
# Theme matches kara: bg=#111111 accent=#6bacac border=#353535.
general {
    border_size = 2
    gaps_in = 4
    gaps_out = 0
    col.active_border = rgb(6bacac)
    col.inactive_border = rgb(353535)
    layout = master
    resize_on_border = true
    no_focus_fallback = true
    allow_tearing = false
}

# ─── Decoration (the reason we're here: dim + blur on specials) ──────
# `dim_special` darkens the underlying workspace when a special
# overlay is active — kara's `dim_alpha` for scratchpads. Blur
# applies on the overlay surface.
decoration {
    rounding = 0
    dim_special = 0.4
    blur {
        enabled = true
        special = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = false
    }
    shadow {
        enabled = false
    }
}

# ─── Animations ──────────────────────────────────────────────────────
# Kept brief so input latency stays low on 144Hz. Bump durations or
# disable if anything feels sluggish.
animations {
    enabled = true
    bezier = quick, 0.25, 0.46, 0.45, 0.94
    animation = windows, 1, 3, quick
    animation = workspaces, 1, 3, quick
    animation = specialWorkspace, 1, 4, quick, slidefadevert
    animation = fade, 1, 4, quick
}

# ─── Master layout (mfact, swap-with-master) ─────────────────────────
master {
    new_status = master
    mfact = 0.55
    orientation = left
}

# ─── Input ───────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 0
    mouse_refocus = false
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

# ─── Misc ────────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = false
    force_default_wallpaper = 0
    background_color = rgb(111111)
}

cursor {
    inactive_timeout = 2
    no_warps = true
}

# ─── Environment ─────────────────────────────────────────────────────
env = XCURSOR_THEME, Bibata-Modern-Classic
env = XCURSOR_SIZE, 20
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = QT_QPA_PLATFORM, wayland
env = MOZ_ENABLE_WAYLAND, 1
env = _JAVA_AWT_WM_NONREPARENTING, 1
env = ELECTRON_OZONE_PLATFORM_HINT, wayland

# ─── Window rules ────────────────────────────────────────────────────
# Initial app placement (from kara autostart docked profile).
windowrulev2 = workspace 31, class:^(thunderbird)$
windowrulev2 = workspace 31, class:^(thunderbird-esr)$

# Generic floats (kara's transient dialog behavior).
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = size 60% 60%, class:^(pavucontrol)$
windowrulev2 = center 1, class:^(pavucontrol)$

windowrulev2 = float, class:^(mpv)$
windowrulev2 = size 80% 80%, class:^(mpv)$
windowrulev2 = center 1, class:^(mpv)$

# Dialogs / pop-ups — center on focused output, let the window self-size.
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save As)$
windowrulev2 = center 1, floating:1, onworkspace:m[*]

# ─── Scratchpads (Hyprland special workspaces) ───────────────────────
# `silent` = route there without yanking focus. The toggle bind is
# at the bottom, via hyprland-scratch-show (spawn-on-demand wrapper).
windowrulev2 = workspace special:todo silent,    class:^(scratch-todo)$
windowrulev2 = workspace special:music silent,   class:^(spotatui)$
windowrulev2 = workspace special:glances silent, class:^(scratch-glances)$
windowrulev2 = workspace special:mixer silent,   class:^(pulsemixer)$

# Pop-up specials are floating + sized + centered. Full-screen
# specials (glances, music) use Hyprland's tiling within the
# special workspace, which fills the output by default.
windowrulev2 = float, class:^(scratch-todo)$
windowrulev2 = size 75% 80%, class:^(scratch-todo)$
windowrulev2 = center 1, class:^(scratch-todo)$

windowrulev2 = float, class:^(pulsemixer)$
windowrulev2 = size 60% 60%, class:^(pulsemixer)$
windowrulev2 = center 1, class:^(pulsemixer)$

# ─── Autostart ───────────────────────────────────────────────────────
exec-once = mako
exec-once = waybar -c ~/.config/waybar/hyprland.jsonc -s ~/.config/waybar/style.css
exec-once = kara-toe --server
exec-once = /usr/lib/xdg-desktop-portal-wlr
exec-once = swayidle -w \
    timeout 600  'swaylock -f -c 111111' \
    timeout 900  'hyprctl dispatch dpms off' \
    resume       'hyprctl dispatch dpms on' \
    before-sleep 'swaylock -f -c 111111'

# Initial focus to center monitor + autolaunch floorp.
exec-once = sh -c 'sleep 2 && hyprctl dispatch workspace 21 && floorp'

# ═══════════════════════════════════════════════════════════════════
# Keybinds
# ═══════════════════════════════════════════════════════════════════

# ─── App launch ──────────────────────────────────────────────────────
bind = $mod, Return,        exec, $terminal
bind = $mod, D,             exec, $launcher
bind = $mod, E,             exec, $file_manager
bind = $mod SHIFT, V,       exec, rofi-videos

# ─── Screenshots ─────────────────────────────────────────────────────
bind = , Print,             exec, sh -c 'grim ~/Pictures/screenshot-$(date +%s).png'
bind = $mod SHIFT, S,       exec, sh -c 'grim -g "$(slurp)" - | wl-copy -t image/png'

# ─── Scratchpads (special workspaces, spawn-on-demand) ───────────────
# First press spawns; subsequent presses toggle the overlay (with
# native dim+blur on the workspace underneath, which is the whole
# point of switching to Hyprland).
bind = $mod, apostrophe, exec, hyprland-scratch-show todo "kara-toe-client --app-id=scratch-todo nvim $HOME/.dotfiles/personal/TODO.md"
bind = $mod, semicolon,  exec, hyprland-scratch-show music "kara-toe-client --app-id=spotatui tmux new-session -A -s spotify spotatui"
bind = $mod, G,          exec, hyprland-scratch-show glances "kara-toe-client --app-id=scratch-glances glances --time 5"
bind = $mod, M,          exec, hyprland-scratch-show mixer "kara-toe-client --app-id=pulsemixer pulsemixer"

# ─── Focus ───────────────────────────────────────────────────────────
bind = $mod, J,             layoutmsg, cyclenext
bind = $mod, K,             layoutmsg, cycleprev
bind = $mod, H,             focusmonitor, l
bind = $mod, L,             focusmonitor, r
bind = $mod SHIFT, H,       movewindow, mon:l
bind = $mod SHIFT, L,       movewindow, mon:r

# ─── Master area resize + zoom ───────────────────────────────────────
bind = $mod, bracketleft,   layoutmsg, mfact -0.05
bind = $mod, bracketright,  layoutmsg, mfact +0.05
bind = $mod SHIFT, Return,  layoutmsg, swapwithmaster master

# ─── Layout ──────────────────────────────────────────────────────────
# Workspace-level fullscreen. mod+J/mod+K cycle through windows even
# while fullscreened (Hyprland's cyclenext respects fullscreen state).
bind = $mod, F,             fullscreen, 1
bind = $mod, T,             exec, hyprland-float-toggle

# ─── Window management ───────────────────────────────────────────────
bind = $mod, Q,             killactive,
bind = $mod SHIFT, R,       exec, hyprctl reload
bind = $mod SHIFT, Q,       exit,
bind = $mod SHIFT, X,       exec, swaylock -f -c 111111

# ─── Workspaces (per-output, via hyprland-ws helper) ─────────────────
bind = $mod, 1, exec, hyprland-ws switch 1
bind = $mod, 2, exec, hyprland-ws switch 2
bind = $mod, 3, exec, hyprland-ws switch 3
bind = $mod, 4, exec, hyprland-ws switch 4
bind = $mod, 5, exec, hyprland-ws switch 5
bind = $mod, 6, exec, hyprland-ws switch 6
bind = $mod, 7, exec, hyprland-ws switch 7
bind = $mod, 8, exec, hyprland-ws switch 8
bind = $mod, 9, exec, hyprland-ws switch 9
bind = $mod SHIFT, 1, exec, hyprland-ws move 1
bind = $mod SHIFT, 2, exec, hyprland-ws move 2
bind = $mod SHIFT, 3, exec, hyprland-ws move 3
bind = $mod SHIFT, 4, exec, hyprland-ws move 4
bind = $mod SHIFT, 5, exec, hyprland-ws move 5
bind = $mod SHIFT, 6, exec, hyprland-ws move 6
bind = $mod SHIFT, 7, exec, hyprland-ws move 7
bind = $mod SHIFT, 8, exec, hyprland-ws move 8
bind = $mod SHIFT, 9, exec, hyprland-ws move 9

# ─── Floating with mouse ─────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ─── Media / volume / brightness keys ────────────────────────────────
bindl = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute,         exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86MonBrightnessUp,   exec, brightnessctl set +10%
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindl = , XF86AudioPlay,         exec, playerctl play-pause
bindl = , XF86AudioNext,         exec, playerctl next
bindl = , XF86AudioPrev,         exec, playerctl previous

# ─── Local overrides ─────────────────────────────────────────────────
# Machine-local tweaks live outside the stow tree.
source = ~/.config/hypr/conf.d/*.conf
