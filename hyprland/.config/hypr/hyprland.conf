# hyprland.conf — ~/.config/hypr/hyprland.conf
#
# Reload: mod+Shift+r. Exit: mod+Shift+q.
#
# Hyprland's hyprlang parser does NOT support backslash line
# continuation — every directive must be on a single line.

# ─── Variables ───────────────────────────────────────────────────────
$mod = SUPER
$terminal = kara-toe-client
$browser = floorp
$file_manager = kara-toe-client --app-id=lf lf
$launcher = fuzzel --config=$HOME/.config/fuzzel/fuzzel-hyprland.ini

# ─── Monitors ────────────────────────────────────────────────────────
# Default fallback for every monitor — preferred mode + auto position.
# hyprland-output-profile detects the specific monitors by resolution
# and applies the correct docked/undocked layout at startup.
# Connector names (DVI-I-*) are NOT hardcoded here because evdi
# (DisplayLink) renames them across driver loads / kernel upgrades.
monitor = , preferred, auto, 1

# ─── Workspaces ──────────────────────────────────────────────────────
# Per-output workspace ranges. mod+1..9 / mod+Shift+1..9 go through
# hyprland-ws, which computes the per-monitor base offset dynamically
# from monitor positions (first X → base 10, second X → base 20, etc.)
# so connector-name flapping doesn't break the mapping.
#
# The monitor-to-workspace bindings (e.g. "r[21-29] monitor:OUTPUT")
# are set at runtime by hyprland-output-profile after it detects the
# actual connector names — repeating them here would break when evdi
# renames outputs. The bare range declarations below just reserve the
# IDs so they're valid targets for workspace dispatch.
workspace = r[1-9]
workspace = r[11-19]
workspace = r[21-29]
workspace = r[31-39]

# ─── General / colors ────────────────────────────────────────────────
# Theme matches kara: bg=#111111 accent=#6bacac border=#353535.
general {
    border_size = 1
    gaps_in = 4
    gaps_out = 8
    # 1px hairline — visual weight comes from the colored shadow halo
    # (decoration block) and the rotating gradient angle, not from the
    # border thickness. Pywal rewrites this gradient via `hyprctl keyword`.
    col.active_border = rgb(6bacac) rgb(b48ead) rgb(458588) rgb(6bacac) 45deg
    col.inactive_border = rgb(2a2a2a)
    layout = dwindle
    resize_on_border = true
    no_focus_fallback = true
    allow_tearing = false
}

# ─── Decoration ──────────────────────────────────────────────────────
# Blur subsystem stays enabled but is suppressed on every window via
# the `noblur` rule below — only the waybar layer (see layerrule)
# gets a light blur. Special workspaces still dim the underlying
# workspace via `dim_special`; that's separate from blur.
decoration {
    rounding = 10
    # Subtle dim on inactive windows: at 0.05 it's barely perceptible
    # on its own but works with the cyan-tinted focused-shadow below
    # to make the active window genuinely "pop" forward.
    dim_inactive = true
    dim_strength = 0.06
    dim_special = 0.45
    active_opacity = 1.0
    inactive_opacity = 1.0
    blur {
        enabled = true
        size = 4
        passes = 1
        new_optimizations = true
        ignore_opacity = false
    }
    shadow {
        enabled = true
        range = 8
        render_power = 2
        # Centered so the active-window glow radiates evenly on all
        # sides. Offset is shared between active and inactive in
        # Hyprland, so we can't give the inactive a directional drop
        # shadow without lopsiding the glow.
        offset = 0 0
        # Active = accent-colored halo (the "glow"). At alpha 0x3a (~23%)
        # it reads as a soft light, not a tinted shadow. Pywal rewrites
        # this color at runtime so the glow tracks the wallpaper palette.
        # Inactive = neutral translucent black so unfocused windows
        # still feel like layered cards, no color clash.
        color          = rgba(8fd3d33a)
        color_inactive = rgba(00000038)
    }
}

# Nothing rendered as a window gets blurred. Terminal, browser,
# scratchpad popups — all unblurred. (Subsystem stays on so the
# layerrule below still has something to attach to.)
windowrule = no_blur on, match:class .*

# Bar gets the only blur. Waybar's layer-shell namespace is "waybar".
layerrule = blur on, match:namespace waybar

# ─── Animations (snappy — kept short for 144Hz) ──────────────────────
animations {
    enabled = true
    bezier = snap, 0.22, 1, 0.36, 1
    bezier = pop, 0.34, 1.56, 0.64, 1
    bezier = liner, 1, 1, 1, 1
    animation = windows,          1, 2, snap
    animation = windowsOut,       1, 2, snap, popin 80%
    # Workspace switch animation off — instant cut, no slide.
    animation = workspaces,       0
    animation = specialWorkspace, 1, 3, snap, slidefadevert
    animation = fade,             1, 2, snap
    # `border` controls how fast the active/inactive border colors
    # crossfade on focus change. 2 (= 200ms) snaps focus instantly;
    # the previous 5 felt laggy when window-walking.
    animation = border,           1, 2, snap
    # Border angle rotation — 4s loop. Visible motion on the focused
    # window's gradient without being agitating.
    animation = borderangle,      1, 40, liner, loop
}

# ─── Dwindle (fibonacci) layout ──────────────────────────────────────
# Spiral/fibonacci tiling: each new window splits the focused one,
# halving it along its longer axis so the layout winds inward.
# `preserve_split` keeps a split's orientation once set instead of
# re-deciding from the new geometry. Pseudotiling is a dispatcher-only
# toggle (mod+P below) in current Hyprland — there is no dwindle config
# key for it.
dwindle {
    preserve_split = true
    force_split = 0
}

# ─── Input ───────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 0
    mouse_refocus = false
    sensitivity = 0
    touchpad {
        natural_scroll = false
        tap-to-click = true
        disable_while_typing = true
    }
}

# vfr moved from misc → debug in Hyprland 0.55.0
debug {
    vfr = true
}

# ─── Misc ────────────────────────────────────────────────────────────
misc {
    # Sans for text, Nerd Font fallback so notification icon glyphs
    # (e.g. the update/error toasts) resolve instead of rendering tofu.
    font_family = Sans, FiraCode Nerd Font
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = false
    force_default_wallpaper = 0
    background_color = rgb(111111)
    enable_swallow = false
    # When a tiled window requests focus while another is
    # fullscreen/maximized, have it take over the fullscreen state
    # (kara monocle behavior: new window pops on top, workspace
    # stays in monocle). Default 2 = unfullscreen the existing
    # window, which broke monocle the moment any new window
    # appeared on the workspace.
    # 0 = ignore, 1 = take over, 2 = unfullscreen.
    on_focus_under_fullscreen = 1
    # Same idea on the *exit* side — closing the maximized window
    # promotes the next focused window into the fullscreen state
    # rather than dropping the workspace back to tiled.
    exit_window_retains_fullscreen = true
}

cursor {
    inactive_timeout = 2
    # Allow warps so workspace + monitor focus changes can pull the
    # cursor along — keeps the pointer in sync with keyboard focus
    # across three monitors so any incidental hover/click lands on
    # the same screen your eyes are on. hyprland-output adds a
    # movecursor dispatch on top of focusmonitor for the cross-output
    # case (focusmonitor itself doesn't warp).
    no_warps = false
    warp_on_change_workspace = true
}

# ─── Environment ─────────────────────────────────────────────────────
env = XCURSOR_THEME, Banana
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_THEME, Banana
env = HYPRCURSOR_SIZE, 20
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = QT_QPA_PLATFORM, wayland
env = MOZ_ENABLE_WAYLAND, 1
env = _JAVA_AWT_WM_NONREPARENTING, 1
env = ELECTRON_OZONE_PLATFORM_HINT, wayland

# ─── Window rules ────────────────────────────────────────────────────
# Modern syntax (wiki/Configuring/Window-Rules):
#   windowrule = match:FIELD REGEX, EFFECT [VALUE]
# `match:class REGEX` is space-separated; bool effects like `float`
# need an explicit `1`/`on` value (the parser otherwise treats bare
# `float` as a prop name with a missing value).

# Outlook mail scratchpad — Floorp window launched with --class=floorp-mail
# so it gets a unique app_id we can match without affecting any other
# Floorp windows the user opens to outlook.cloud.microsoft.
windowrule = match:class ^floorp-mail$, workspace special:mail silent
windowrule = match:class ^floorp-mail$, fullscreen_state 1 0

# Pavucontrol / mpv: centered floats.
windowrule = match:class ^(pavucontrol)$, float 1, size 60% 60%, center 1
windowrule = match:class ^(mpv)$,         float 1, size 80% 80%, center 1

# lf in kara-toe-client, spawned by xdg-desktop-portal-termfilechooser
# whenever a GTK app (Floorp, etc.) opens a file picker. Big centered
# float so lf's image previews are actually readable — replaces the
# tiny-thumbnail GTK chooser.
windowrule = match:class ^(lf-portal)$, float 1, size 75% 80%, center 1

# Generic transient dialogs.
windowrule = match:title ^(Open File|Save As)$, float 1

# ─── Scratchpads (special workspaces, autostart + monocle default) ───
# Two specials, two windows each (matches the user's preference that
# related popups share a scratchpad and you cycle between them with
# mod+j/k):
#   special:todo  ← scratch-todo (TODO.md) + scratch-glances (glances)
#   special:media ← spotatui (music) + pulsemixer (audio mixer)
#
# Each scratchpad window opens in `fullscreen_state 1 0` (Hyprland's
# "maximize" mode) so the special-workspace toggle reveals one
# window filling the workspace area — kara's monocle default.
# mod+j / mod+k cycle which window holds the maximize, via
# hyprland-monocle.
windowrule = match:class ^(scratch-todo|scratch-glances)$, workspace special:todo silent
windowrule = match:class ^(spotatui|pulsemixer)$,          workspace special:media silent
windowrule = match:class ^(scratch-todo|scratch-glances|spotatui|pulsemixer)$, fullscreen_state 1 0

# ─── Autostart ───────────────────────────────────────────────────────
# Background services. Each on a single line — hyprlang doesn't
# accept backslash continuations.
# Visual essentials — fire immediately, in order of "what the user
# sees first on login": wallpaper, bar, cursor.
exec-once = hyprland-hyprpaper
exec-once = hyprland-waybar
# Cursor apply is deferred until after the renderer warms up.
# `hyprland-cursor apply` calls `forcerendererreload` to force a
# repaint of the cursor surface (otherwise the new theme doesn't
# appear until the next frame is drawn — usually whenever floorp
# maps). Running forcerendererreload at t=0 stalls for ~3s waiting
# on renderer init; running it at t=0.5s is near-instant.
exec-once = sh -c 'sleep 0.5 && hyprland-cursor apply'

# Saved wallpaper override — hyprpaper.conf has a fallback default
# so something paints immediately; this swaps it to the saved choice
# once hyprpaper's IPC is up.
exec-once = sh -c 'sleep 1 && hyprland-wallpaper apply'

# Background services. NOT manually launching xdg-desktop-portal /
# xdg-desktop-portal-hyprland — those are dbus-activated services
# (the .service files in /usr/share/dbus-1/services/ start them on
# demand). Manual exec-once was forcing dbus into a startup storm
# that delayed everything else by ~10s.
exec-once = swaync
# Tiny centered HUD daemon for volume/brightness keys (compact pill
# instead of a full-width swaync card). The volume/brightness scripts
# auto-detect this and delegate when it's up.
exec-once = swayosd-server
exec-once = hypridle
exec-once = kara-toe --server
# Output profile daemon — applies docked vs. undocked monitor layout
# at startup and re-applies on hot-plug.
exec-once = hyprland-output-profile

# Initial browser. Low-priority; small delay so it doesn't fight
# the bar/wallpaper for first-paint resources. Force-focus the center
# 1440p first so the new floorp window lands on the main monitor when
# docked — Hyprland otherwise opens it on whichever workspace was
# focused at startup, which (with the per-output ranges) tends to be
# the rightmost monitor's workspace at base 30. The hyprland-ws
# center-monitor helper finds whatever 1440p screen is present (or
# falls back to the leftmost external), so this works even when evdi
# renames the connectors. Safe no-op in laptop-only mode.
exec-once = sh -c 'sleep 1 && center=$(hyprland-ws center 2>/dev/null) && hyprctl dispatch focusmonitor "$center" >/dev/null 2>&1; floorp'

# Scratchpad windows. Staggered so the four heavy children
# (nvim, glances, tmux/spotatui, pulsemixer) don't hit the disk in
# parallel — that was the second-biggest contributor to login lag.
# All four ready by ~5s.
exec-once = sh -c 'sleep 2 && kara-toe-client --app-id=scratch-todo nvim $HOME/.dotfiles/personal/TODO.md'
exec-once = sh -c 'sleep 3 && kara-toe-client --app-id=spotatui tmux new-session -A -s spotify spotatui'
exec-once = sh -c 'sleep 4 && kara-toe-client --app-id=scratch-glances glances --time 5'
exec-once = sh -c 'sleep 5 && kara-toe-client --app-id=pulsemixer pulsemixer'

# ═══════════════════════════════════════════════════════════════════
# Keybinds
# ═══════════════════════════════════════════════════════════════════

# ─── App launch ──────────────────────────────────────────────────────
bind = $mod, Return,        exec, $terminal
bind = $mod, D,             exec, $launcher
bind = $mod, E,             exec, $file_manager
bind = $mod SHIFT, V,       exec, rofi-videos
# mod+g is intentionally unbound — glances shares special:todo with the
# TODO buffer, accessed via mod+'.

# ─── Screenshots / color picker ──────────────────────────────────────
# `screenshot` is our wrapper around hyprshot — it fires a swaync
# notification with the file name; clicking the notification body
# opens the folder via xdg-open.
bind = , Print,             exec, screenshot output
bind = $mod SHIFT, S,       exec, screenshot region
bind = $mod, Print,         exec, screenshot window
# hyprpicker -a copies the picked color to the clipboard. Useful
# for theme work — pair with `wl-paste` to read back.
bind = $mod SHIFT, P,       exec, hyprpicker -a -n

# ─── Scratchpads (toggle native specials, respawn missing windows) ───
# Three scratchpads. Each binding goes through hyprland-scratch-show,
# which checks for the expected app_ids and respawns any that have
# been killed before toggling the special workspace — so killing a
# scratchpad window doesn't permanently empty its scratchpad.
#   mod+'  → special:todo  (TODO.md ↔ glances)
#   mod+;  → special:media (spotatui ↔ pulsemixer)
#   mod+m  → special:mail  (Outlook web)
# mod+j / mod+k while the special is open cycle the maximize between
# the two windows (via hyprland-monocle in the focus binds above).
bind = $mod, apostrophe, exec, hyprland-scratch-show todo
bind = $mod, semicolon,  exec, hyprland-scratch-show media
bind = $mod, M,          exec, hyprland-scratch-show mail

# ─── Focus ───────────────────────────────────────────────────────────
# mod+j/mod+k cycle leaves with monocle awareness: while monocle is
# active they atomically swap fullscreen state to the next leaf;
# otherwise they walk focus only.
bind = $mod, J,             exec, hyprland-monocle cycle-next
bind = $mod, K,             exec, hyprland-monocle cycle-prev
# hyprland-output adds wraparound on top of native focusmonitor /
# movewindow so cycling left from the leftmost monitor jumps to the
# rightmost (and vice versa) — useful with three monitors where
# bouncing back across two unused outputs is annoying.
bind = $mod, H,             exec, hyprland-output focus l
bind = $mod, L,             exec, hyprland-output focus r
bind = $mod SHIFT, H,       exec, hyprland-output move  l
bind = $mod SHIFT, L,       exec, hyprland-output move  r

# ─── Split resize + swap ─────────────────────────────────────────────
# Dwindle resizes the active window's parent split rather than a global
# mfact; splitratio shifts the divider of the focused tile. swapsplit
# trades the active window with its sibling — the dwindle analog of the
# old swapwithmaster. pseudotile (mod+P) frees a window from its tile.
bind = $mod, bracketleft,   layoutmsg, splitratio -0.05
bind = $mod, bracketright,  layoutmsg, splitratio +0.05
bind = $mod SHIFT, Return,  layoutmsg, swapsplit
bind = $mod, P,             pseudo,

# ─── Layout ──────────────────────────────────────────────────────────
# mod+f       = kara-style monocle. Focused window fills the
#               workspace area but bar/gaps/borders stay visible
#               (Hyprland fullscreen mode 1 = maximize). mod+j/mod+k
#               while monocle is active swap maximize to the next
#               leaf via hyprland-monocle's atomic batch.
# mod+Shift+f = true fullscreen. Sets both the internal AND client
#               fullscreen states so apps (Floorp tab bar, video
#               players, etc.) actually receive the fullscreen
#               signal and autohide chrome — `fullscreen, 0` only
#               sets internal, leaving the client unaware.
#               2 = fullscreen for both INTERNAL CLIENT.
bind = $mod, F,             exec, hyprland-monocle toggle
bind = $mod SHIFT, F,       fullscreenstate, 2 2
bind = $mod, T,             exec, hyprland-float-toggle

# ─── Window management ───────────────────────────────────────────────
bind = $mod, Q,             killactive,
bind = $mod SHIFT, R,       exec, sh -c 'hyprctl reload && sleep 0.5 && hyprland-output-profile'
bind = $mod SHIFT, Q,       exit,
bind = $mod SHIFT, X,       exec, hyprlock

# ─── Wallpaper + cursor pickers (preview-cycle submaps) ──────────────
# Same UX as the sway versions: enter a submap, h/l (or arrows) to
# cycle with live preview, Enter commits, Escape reverts. Selection
# persists to ~/.local/state/hypr/{wallpaper,cursor}-current.
bind = $mod SHIFT, W, submap, wallpaper
# Cursor mode: temporarily disable cursor autohide so the preview is
# actually visible while cycling. Restored on commit/revert below.
bind = $mod SHIFT, C, exec, hyprctl keyword cursor:inactive_timeout 0
bind = $mod SHIFT, C, submap, cursor

submap = wallpaper
bind = , Right,  exec, hyprland-wallpaper next
bind = , l,      exec, hyprland-wallpaper next
bind = , Down,   exec, hyprland-wallpaper next
bind = , j,      exec, hyprland-wallpaper next
bind = , Left,   exec, hyprland-wallpaper prev
bind = , h,      exec, hyprland-wallpaper prev
bind = , Up,     exec, hyprland-wallpaper prev
bind = , k,      exec, hyprland-wallpaper prev
bind = , p,      exec, hyprland-wallpaper pywal-toggle
bind = , Return, exec, hyprland-wallpaper commit
bind = , Return, submap, reset
bind = , Escape, exec, hyprland-wallpaper revert
bind = , Escape, submap, reset
bind = , q,      exec, hyprland-wallpaper revert
bind = , q,      submap, reset
submap = reset

submap = cursor
bind = , Right,  exec, hyprland-cursor next
bind = , l,      exec, hyprland-cursor next
bind = , Down,   exec, hyprland-cursor next
bind = , j,      exec, hyprland-cursor next
bind = , Left,   exec, hyprland-cursor prev
bind = , h,      exec, hyprland-cursor prev
bind = , Up,     exec, hyprland-cursor prev
bind = , k,      exec, hyprland-cursor prev
# Each exit binding restores cursor autohide (default 2s) before
# resetting the submap.
bind = , Return, exec, hyprland-cursor commit
bind = , Return, exec, hyprctl keyword cursor:inactive_timeout 2
bind = , Return, submap, reset
bind = , Escape, exec, hyprland-cursor revert
bind = , Escape, exec, hyprctl keyword cursor:inactive_timeout 2
bind = , Escape, submap, reset
bind = , q,      exec, hyprland-cursor revert
bind = , q,      exec, hyprctl keyword cursor:inactive_timeout 2
bind = , q,      submap, reset
submap = reset

# ─── Workspaces (per-output via hyprland-ws) ─────────────────────────
# hyprland-ws looks up the focused monitor and maps the digit to the
# correct absolute ID in that output's range (see Workspaces section
# at top of file).
bind = $mod, 1, exec, hyprland-ws switch 1
bind = $mod, 2, exec, hyprland-ws switch 2
bind = $mod, 3, exec, hyprland-ws switch 3
bind = $mod, 4, exec, hyprland-ws switch 4
bind = $mod, 5, exec, hyprland-ws switch 5
bind = $mod, 6, exec, hyprland-ws switch 6
bind = $mod, 7, exec, hyprland-ws switch 7
bind = $mod, 8, exec, hyprland-ws switch 8
bind = $mod, 9, exec, hyprland-ws switch 9
bind = $mod SHIFT, 1, exec, hyprland-ws move 1
bind = $mod SHIFT, 2, exec, hyprland-ws move 2
bind = $mod SHIFT, 3, exec, hyprland-ws move 3
bind = $mod SHIFT, 4, exec, hyprland-ws move 4
bind = $mod SHIFT, 5, exec, hyprland-ws move 5
bind = $mod SHIFT, 6, exec, hyprland-ws move 6
bind = $mod SHIFT, 7, exec, hyprland-ws move 7
bind = $mod SHIFT, 8, exec, hyprland-ws move 8
bind = $mod SHIFT, 9, exec, hyprland-ws move 9

# ─── Floating with mouse ─────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ─── Media / volume / brightness keys ────────────────────────────────
# `volume` and `brightness` wrappers (in scripts/.local/bin) adjust
# the level via wpctl/brightnessctl AND fire a notify-send with a
# progress-bar value hint, which swaync renders as a top-right
# notification card with a real fill bar — modern HUD without a
# separate OSD daemon.
bindl = , XF86AudioRaiseVolume,  exec, volume up
bindl = , XF86AudioLowerVolume,  exec, volume down
bindl = , XF86AudioMute,         exec, volume mute
bindl = , XF86MonBrightnessUp,   exec, brightness up
bindl = , XF86MonBrightnessDown, exec, brightness down
bindl = , XF86AudioPlay,         exec, playerctl play-pause
bindl = , XF86AudioNext,         exec, playerctl next
bindl = , XF86AudioPrev,         exec, playerctl previous
