# hyprlock.conf — ~/.config/hypr/hyprlock.conf
#
# Frosted-glass lock screen styled after the bar / window aesthetic.
# Background is the current wallpaper (followed via wallpaper-lock,
# updated by hyprland-wallpaper); accent colors come from pywal so the
# lockscreen re-tints when the wallpaper palette shifts.

# Pywal-generated accent palette: $accent / $accent_soft / $accent_text
# / $accent_dim. The init action of hyprland-pywal ensures this file
# exists with kara defaults, and `apply` rewrites it on every wallpaper
# change.
source = ~/.cache/wal/hyprlock-colors.conf

general {
    grace = 0
    hide_cursor = true
    no_fade_in = false
    disable_loading_bar = true
}

# ─── Background ─────────────────────────────────────────────────────
# Current wallpaper, heavily blurred + darkened so the foreground
# chrome reads as glass on a quiet field. Symlink is updated by
# hyprland-wallpaper on each commit/cycle.
background {
    monitor =
    path = ~/.local/state/hypr/wallpaper-lock
    blur_passes  = 4
    blur_size    = 10
    contrast     = 0.85
    brightness   = 0.55
    vibrancy     = 0.20
    vibrancy_darkness = 0.0
    noise        = 0.018
}

# ─── Time (focal point) ─────────────────────────────────────────────
# Massive light-weight numerals. No drop shadow — the brightness +
# contrast pulled out of the bg keeps it readable, and no shadow
# means no muddy fringing around the glyphs.
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(ffffffff)
    font_size = 156
    font_family = Adwaita Sans Light
    position = 0, 200
    halign = center
    valign = center
}

# ─── Accent rule ────────────────────────────────────────────────────
# Thin pywal-tinted bar between the time and the date — gives the
# composition a "control panel" rhythm and ties the layout to the
# wallpaper palette without competing with the time.
shape {
    monitor =
    size = 64, 2
    color = $accent_soft
    rounding = 999
    border_size = 0
    position = 0, 70
    halign = center
    valign = center
}

# ─── Date ───────────────────────────────────────────────────────────
# Subtitle below the rule. Accent text color so it lives on the same
# tint as the rule above and the input outline below.
label {
    monitor =
    text = cmd[update:60000] date "+%A · %B %-d"
    color = $accent_text
    font_size = 20
    font_family = Adwaita Sans
    position = 0, 30
    halign = center
    valign = center
}

# ─── User identity (very subtle) ────────────────────────────────────
# "Who is logging in" cue, dim by design.
label {
    monitor =
    text = $USER
    color = rgba(d8d8d877)
    font_size = 13
    font_family = Adwaita Sans
    position = 0, -50
    halign = center
    valign = center
}

# ─── Input field ────────────────────────────────────────────────────
# Pill, translucent inner so the blurred bg shows through, accent
# outline + soft accent halo. The inner color is dark glass; the
# outline picks up pywal so it re-tints with each wallpaper.
input-field {
    monitor =
    size = 380, 56
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.45
    dots_center = true
    dots_rounding = -1
    outer_color = $accent
    inner_color = rgba(15151580)
    font_color  = rgba(f2f2f2ff)
    fade_on_empty = false
    placeholder_text = <i><span foreground="##c5c5c577">password</span></i>
    hide_input = false
    rounding = 999
    check_color = rgb(a3be8c)
    fail_color  = rgb(bf616a)
    fail_text   = <i>$FAIL ($ATTEMPTS)</i>
    position = 0, -130
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(00000033)
}
