# hyprlock.conf — ~/.config/hypr/hyprlock.conf
#
# Pretty Wayland lock screen. Theme matches kara: bg=#111111
# accent=#6bacac. Wallpaper is shown blurred behind the input field.

general {
    grace = 0
    hide_cursor = true
    no_fade_in = false
    disable_loading_bar = true
}

background {
    monitor =
    path = ~/.local/state/sway/wallpapers/default.png
    blur_passes = 3
    blur_size = 8
    contrast = 0.9
    brightness = 0.7
    vibrancy = 0.15
}

input-field {
    monitor =
    size = 360, 60
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgb(6bacac)
    inner_color = rgb(1b1b1b)
    font_color = rgb(f2f2f2)
    fade_on_empty = false
    placeholder_text = <i>password</i>
    hide_input = false
    rounding = 8
    check_color = rgb(6bacac)
    fail_color = rgb(bf616a)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(f2f2f2)
    font_size = 96
    font_family = FiraCode Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date "+%A, %B %d"
    color = rgb(5c5c5c)
    font_size = 22
    font_family = FiraCode Nerd Font
    position = 0, 100
    halign = center
    valign = center
}
