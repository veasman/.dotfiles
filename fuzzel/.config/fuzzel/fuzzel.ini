# fuzzel — ~/.config/fuzzel/fuzzel.ini
#
# Replaces kara-summon. Colors mirror kara's theme block:
#   bg=#111111  surface=#1b1b1b  text=#f2f2f2  accent=#6bacac
#   border=#353535  muted=#5c5c5c
# fuzzel colors are RRGGBBAA (no leading #).

font=FiraCode Nerd Font:size=12
terminal=kara-toe-client
prompt="❯ "
dpi-aware=auto
width=40
lines=12
horizontal-pad=16
vertical-pad=10
inner-pad=6
line-height=22

[colors]
background=111111ff
text=f2f2f2ff
match=6bacacff
selection=1b1b1bff
selection-text=f2f2f2ff
selection-match=6bacacff
border=6bacacff

[border]
width=2
radius=0

[dmenu]
exit-immediately-if-empty=yes
