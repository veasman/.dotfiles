font=FiraCode Nerd Font:size=13:weight=medium
line-height=17
dpi-aware=no
initial-window-size-chars=120x32
pad=0x0 center

# kara-beautify theme — sets [main] font override + [colors] section.
# Loaded AFTER the declarations above so kara's font override is a no-op
# while its color palette takes precedence. Silently skipped if the file
# doesn't exist yet (first boot before `kara-beautify apply`).
include=~/.local/state/kara/generated/foot-theme.ini

[scrollback]
lines=10000

[cursor]
style=block
blink=no

[csd]
preferred=none
